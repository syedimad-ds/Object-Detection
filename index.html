<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI — Object Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="brand">
                <span class="brand-icon">⬡</span>
                <div class="brand-text">
                    <h1>Edge<span class="brand-accent">AI</span></h1>
                    <p class="brand-sub">Real-Time Object Detection</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-chip">
                    <span class="stat-label">FPS</span>
                    <span class="stat-value" id="fpsDisplay">—</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-label">OBJECTS</span>
                    <span class="stat-value" id="detectionCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Status bar -->
    <div class="status-container">
        <div id="status" class="status-pill status-loading">
            ⏳ Loading YOLO Model... Please wait.
        </div>
    </div>

    <!-- Camera viewport -->
    <main class="viewport-container">
        <div class="video-wrapper" id="videoWrapper">

            <!-- Corner scan lines decoration -->
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>

            <!-- Scan line animation overlay -->
            <div class="scan-line" id="scanLine"></div>

            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output_canvas"></canvas>

            <!-- Camera switch (mobile only) -->
            <button id="switchCamBtn" class="cam-switch-btn" title="Switch Camera">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </button>

        </div>
    </main>

    <!-- Info strip -->
    <footer class="info-strip">
        <span class="info-item">🔒 100% Local · No data sent to servers</span>
        <span class="info-sep">·</span>
        <span class="info-item">⚡ YOLOv8 + TensorFlow.js</span>
        <span class="info-sep">·</span>
        <span class="info-item">80 COCO classes</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
