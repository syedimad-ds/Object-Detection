<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI Object Detection</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
</head>
<body>

    <div class="container text-center py-4 mt-2">
        <h1 class="text-success fw-bold">Real-Time Object Detection</h1>
        <p class="text-muted mb-4">Running entirely in your browser using YOLOv8 & TF.js</p>
        
        <div id="status" class="alert alert-warning d-inline-block shadow-sm">
            ⏳ Loading YOLO Model... Please wait.
        </div>
    </div>

    <div class="container d-flex justify-content-center mb-5">
        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output_canvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
